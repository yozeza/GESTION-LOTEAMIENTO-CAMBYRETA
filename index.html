<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=3.0">
    <title>GESTION LOTEAMIENTO CAMBYRETA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        #contenedor-svg rectangle, #contenedor-svg polygon, #contenedor-svg path, #contenedor-svg rect {
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            -webkit-tap-highlight-color: transparent;
        }
        #contenedor-svg svg { width: 100% !important; height: auto !important; max-height: 60vh; }
        @media (min-width: 768px) { #contenedor-svg svg { max-height: 75vh; } }
    </style>
</head>
<body class="bg-gray-100 font-sans md:h-screen flex flex-col min-h-screen">

    <!-- HEADER AJUSTADO -->
    <header class="bg-slate-800 text-white p-4 shadow-md flex justify-between items-center relative z-20">
        <div class="flex items-center space-x-3">
            <div class="bg-emerald-500 p-2 rounded-lg text-xl font-bold">🗺️</div>
            <h1 class="text-base font-bold tracking-wider">CAMBYRETA</h1>
        </div>
        
        <!-- BOTÓN DE ASIGNACIÓN RÁPIDA (DISCRETO) -->
        <div class="relative">
            <button onclick="document.getElementById('menu-mapeo').classList.toggle('hidden')" class="bg-slate-700 hover:bg-slate-600 p-2 rounded-full transition-all border border-slate-500 text-sm">
                🛠️
            </button>
            <div id="menu-mapeo" class="hidden absolute right-0 top-12 w-56 bg-white p-4 rounded-xl shadow-2xl border border-gray-200 z-50">
                <h3 class="text-xs font-bold text-slate-500 uppercase mb-3 border-b pb-2">Asignación Rápida</h3>
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs font-semibold text-slate-700">Modo Activo</span>
                    <input type="checkbox" id="chk-modo-mapeo" onchange="conmutarModoMapeo()" class="toggle">
                </div>
                <div id="controles-mapeo" class="grid grid-cols-2 gap-2 opacity-50 pointer-events-none">
                    <div><label class="text-[9px] uppercase font-bold text-slate-400">Manzana</label><input id="map-mza" type="text" value="A" class="w-full bg-gray-100 border rounded p-1 text-xs text-center font-bold text-slate-800"></div>
                    <div><label class="text-[9px] uppercase font-bold text-slate-400">Siguiente</label><input id="map-nro" type="number" value="1" class="w-full bg-gray-100 border rounded p-1 text-xs text-center font-bold text-slate-800"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="flex-1 flex flex-col md:flex-row overflow-y-auto md:overflow-hidden">
        <!-- (Resto del cuerpo igual al original, manteniendo las funciones necesarias para la lógica) -->
        <!-- ... [Contenido del cuerpo original manteniendo el ID #contenedor-svg] ... -->
    </div>

    <script type="module">
        // ... (Mantén tu lógica de Firebase y funciones previas intactas) ...
        
        // Nueva lógica para el control discreto
        window.conmutarModoMapeo = function() {
            const activo = document.getElementById('chk-modo-mapeo').checked;
            const controles = document.getElementById('controles-mapeo');
            if (activo) {
                controles.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                controles.classList.add('opacity-50', 'pointer-events-none');
            }
            // Aquí llamarías a la lógica de mapeo que ya tenías vinculada al evento click
        }
    </script>
</body>
</html>
