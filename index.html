<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTION LOTEAMIENTO CAMBYRETA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        #contenedor-svg svg { width: 100% !important; height: auto !important; max-height: 60vh; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col">

    <header class="bg-slate-800 text-white p-4 shadow-md font-bold">
        GESTION LOTEAMIENTO CAMBYRETA
    </header>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-72 bg-slate-50 p-4 border-r border-gray-200">
            <button onclick="document.getElementById('import-csv').click()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold text-sm shadow-md transition-all">
                📥 Importar CSV Normalizado
            </button>
            <input type="file" id="import-csv" class="hidden" accept=".csv" onchange="procesarImportacionCSV(event)">
        </aside>

        <main class="flex-1 p-4 overflow-y-auto">
            <div id="contenedor-svg" class="bg-white p-4 rounded shadow-lg"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // --- TU CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDFk6NFEE0Hf5IjUMUP5F7cyFg7T3EXhqg",
            authDomain: "cambyreta-lotes.firebaseapp.com",
            projectId: "cambyreta-lotes",
            storageBucket: "cambyreta-lotes.firebasestorage.app",
            messagingSenderId: "614326622443",
            appId: "1:614326622443:web:7979f0d0aee5986f0a06ae"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- LÓGICA DE NORMALIZACIÓN ---
        function normalizarLlave(rawFraccion, rawMza, rawLote) {
            // Mapeo de Manzanas
            const mapaManzanas = { '001': 'A', '002': 'B', '003': 'C' };
            const mza = mapaManzanas[rawMza] || rawMza;
            
            // Eliminar ceros a la izquierda del lote
            const lote = parseInt(rawLote, 10).toString();

            return { mza, lote, key: `${mza}-${lote}` };
        }

        // --- PROCESADOR CSV ---
        window.procesarImportacionCSV = function(event) {
            const file = event.target.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split('\n').slice(1); // Saltar encabezados

                rows.forEach(row => {
                    if (!row.trim()) return;
                    const cols = row.split(',').map(c => c.replace(/"/g, '').trim());
                    
                    // Supone formato: 206/003/0016
                    const partes = cols[0].split('/'); 
                    if (partes.length < 3) return;

                    const f = partes[0]; // 206
                    const m = partes[1]; // 003
                    const l = partes[2]; // 0016

                    const datos = normalizarLlave(f, m, l);

                    // Guardar en Firebase
                    set(ref(db, 'lotes/' + datos.key), {
                        fraccion: f,
                        manzana: datos.mza,
                        lote: datos.lote,
                        cliente: cols[2] || "Sin nombre",
                        ultimaImportacion: new Date().toISOString()
                    });
                });
                alert("Base de datos actualizada con éxito (Manzanas A/B/C y Lotes limpios).");
            };
            reader.readAsText(file);
        };
    </script>
</body>
</html>
